<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Veyro - Customize & Book Your Ride</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(18, 24, 38, 0.85);
            --card-border: rgba(255, 255, 255, 0.08);
            --input-bg: rgba(255, 255, 255, 0.04);
            --input-border: rgba(255, 255, 255, 0.12);
            --accent-primary: #6366f1;
            --accent-cyan: #06b6d4;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --gradient-primary: linear-gradient(135deg, #6366f1 0%, #a855f7 50%, #06b6d4 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
            position: relative;
        }

        .glow-bg {
            position: fixed;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(99, 102, 241, 0.15) 0%, rgba(6, 182, 212, 0.05) 50%, transparent 70%);
            top: 30%;
            left: 50%;
            transform: translate(-50%, -30%);
            z-index: 0;
            pointer-events: none;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 680px;
            width: 100%;
        }

        .header-nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 26px;
            font-weight: 800;
            background: var(--gradient-primary);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid var(--card-border);
            border-radius: 24px;
            padding: 40px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 700;
            margin-bottom: 8px;
            color: #ffffff;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin-bottom: 32px;
        }

        .form-group {
            margin-bottom: 24px;
        }

        label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--text-main);
            margin-bottom: 8px;
        }

        input[type="text"], select {
            width: 100%;
            padding: 14px 18px;
            background: var(--input-bg);
            border: 1px solid var(--input-border);
            border-radius: 14px;
            font-size: 15px;
            color: #ffffff;
            font-family: inherit;
            transition: all 0.2s ease;
            outline: none;
        }

        select option {
            background-color: #121826;
            color: #ffffff;
        }

        input[type="text"]:focus, select:focus {
            border-color: var(--accent-primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.15);
            background: rgba(255, 255, 255, 0.07);
        }

        .grid-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .btn-submit {
            width: 100%;
            padding: 18px;
            margin-top: 12px;
            font-size: 17px;
            font-weight: 700;
            color: #ffffff;
            background: var(--gradient-primary);
            border: none;
            border-radius: 16px;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(99, 102, 241, 0.4);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 15px 40px rgba(99, 102, 241, 0.6);
        }
    </style>
</head>
<body>
    <div class="glow-bg"></div>

    <div class="container">
        <div class="header-nav">
            <a href="/" class="logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="url(#logo-grad)" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                    <defs>
                        <linearGradient id="logo-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                            <stop offset="0%" stop-color="#6366f1" />
                            <stop offset="100%" stop-color="#06b6d4" />
                        </linearGradient>
                    </defs>
                    <polygon points="13 2 3 14 12 14 11 22 21 10 12 10 13 2"></polygon>
                </svg>
                Veyro
            </a>
        </div>

        <div class="card">
            <h2>Book Your Custom Ride</h2>
            <p class="subtitle">Enter your trip details below to generate and stream telemetry live to Azure Event Hub.</p>

            <form action="/book" method="POST">
                <div class="form-group">
                    <label for="passenger_name">Passenger Full Name</label>
                    <input type="text" id="passenger_name" name="passenger_name" placeholder="e.g., Alex Johnson" required>
                </div>

                <div class="form-group">
                    <label for="pickup_address">Pickup Location</label>
                    <input type="text" id="pickup_address" name="pickup_address" placeholder="e.g., 742 Evergreen Terrace, Springfield" required>
                </div>

                <div class="form-group">
                    <label for="dropoff_address">Dropoff Location</label>
                    <input type="text" id="dropoff_address" name="dropoff_address" placeholder="e.g., Downtown Financial District Plaza" required>
                </div>

                <div class="grid-2">
                    <div class="form-group">
                        <label for="vehicle_type">Vehicle Experience</label>
                        <select id="vehicle_type" name="vehicle_type">
                            <option value="VeyroX">VeyroX (Standard)</option>
                            <option value="Veyro Comfort">Veyro Comfort (Extra Legroom)</option>
                            <option value="Veyro Black">Veyro Black (Luxury)</option>
                            <option value="VeyroXL">VeyroXL (Groups)</option>
                            <option value="VeyroPOOL">VeyroPOOL (Shared)</option>
                        </select>
                    </div>

                    <div class="form-group">
                        <label for="payment_method">Payment Method</label>
                        <select id="payment_method" name="payment_method">
                            <option value="Credit Card">Credit Card</option>
                            <option value="Debit Card">Debit Card</option>
                            <option value="Digital Wallet">Digital Wallet (Apple/Google Pay)</option>
                            <option value="Cash">Cash</option>
                        </select>
                    </div>
                </div>

                <button type="submit" class="btn-submit">
                    <span>Confirm Ride & Stream Telemetry</span>
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                        <line x1="5" y1="12" x2="19" y2="12"></line>
                        <polyline points="12 5 19 12 12 19"></polyline>
                    </svg>
                </button>
            </form>
        </div>
    </div>
</body>
</html>
